---
services:
  devcontainer:
    container_name: devcontainer-ai-coder
    image: dceoy/devcontainer-ai-coder:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: cli
      platforms:
        - linux/arm64
        - linux/amd64
      args:
        UBUNTU_VERSION: '24.04'
        USER_NAME: agent
        USER_UID: '1001'
        USER_GID: '1001'
        ZSH_THEME: nicoulaj
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    tty: true
    stdin_open: true
    volumes:
      - .:/workspace
      - home-data:/home/agent
      - ${HOME}/.ssh:/home/agent/.ssh:ro
    working_dir: /workspace
    post_start:
      - command: bash -c '[[ -d /home/agent/.claude ]] || rsync -au /opt/agent/ /home/agent/'
        user: root
      - command: git config --global --add safe.directory /workspace
        user: agent
    user: agent
    entrypoint:
      - /usr/bin/zsh
    command:
      - -c
      - sleep infinity
volumes:
  home-data:
